app:
  name: Objective Detection and Tracker
  version: 1.0.0
  env: development

data:
  input: inputs/videos
  output: outputs/videos
  model: models

detector:
  type: yolov8n-visdrone
  conf_threshold: 0.5
  iou_threshold: 0.4
  classes : [2] # null for all class,
  max_det: 100
  device: 0 # 0 for GPU, -1 for CPU

counter:
  - type: line
    points: [[75, 540], [1332, 540]]
    color: [0, 0, 255] # BGR format
    thickness: 2

