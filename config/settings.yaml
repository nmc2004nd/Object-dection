saver:
  save_images: false
  save_videos: false
  save_detections: false
  save_crops: false

tracker:
  type: bytetrack # or strongsort
  max_age: 30
  n_init: 3
  iou_threshold: 0.3

visualizer:
  show_detections: true
  show_tracks: true
  show_count: true
  # show_fps: true
  # show_time: true

speed:
  enable: false
  FPS: 30 
  # tính thời gian lấy mẫu distance
  pixel_per_meter: 21.7
  # calib bằng pixel_per_meter = pixel / meter : phải biết được kích thước thực tế của 1 vật tron video để calib ra pixel_per_meter
  buffer_size: 5 
  max_speed: [70, 70, 70, 70, 70, 70, 70, 70, 70, 70, 70, 70] # km/h, tốc độ tối đa cho từng làn